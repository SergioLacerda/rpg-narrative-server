repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # Ruff - linting + auto-fix
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.7
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  # Black - formatter oficial
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black

  # MyPy - type checking (novo!)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        # args: [--strict]          # descomente se quiser modo strict (recomendado no futuro)
        # additional_dependencies:  # adicione aqui se mypy reclamar de tipos faltando
        #   - types-requests
        #   - types-pyyaml
        #   - types-python-dateutil
