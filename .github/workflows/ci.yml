name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

# 🔥 compatível com Node 24 (future-proof)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

# ---------------------------------------------------------
# 🧠 LINT
# ---------------------------------------------------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -e .[ci]

      - run: ruff check .
      - run: black --check .
      - run: mypy src || true

# ---------------------------------------------------------
# 🧪 TESTES
# ---------------------------------------------------------
  test:
    runs-on: ${{ matrix.os }}
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -e .[ci]

      - name: Run tests
        env:
          DISCORD_TOKEN: test-token
          ENVIRONMENT: test
          LLM_PROVIDER: mock
          EMBEDDING_PROVIDER: mock
          COVERAGE_FILE: .coverage
        run: pytest --cov=src/rpg_narrative_server --cov-report=term

      # 🔥 debug essencial
      - name: Debug coverage files
        run: ls -a

      # 🔥 upload TODOS os arquivos coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: .coverage*

# ---------------------------------------------------------
# 📊 COVERAGE COMBINADO
# ---------------------------------------------------------
  coverage:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: coverage

      - name: Debug coverage tree
        run: ls -R coverage || true

      - run: pip install coverage

      - name: Combine coverage
        run: |
          coverage combine coverage || true
          coverage xml -o combined.xml

      - uses: codecov/codecov-action@v4
        with:
          files: combined.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

# ---------------------------------------------------------
# 🐳 DOCKER (VALIDAÇÃO)
# ---------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - run: docker build -t rpg-narrative-server:ci .
