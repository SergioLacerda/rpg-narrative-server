name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

# ---------------------------------------------------------
# 🧠 LINT + TYPE (rápido, Linux apenas)
# ---------------------------------------------------------
jobs:
  lint:
    name: Lint & Type
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[ci]

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: Mypy
        run: mypy src || true

# ---------------------------------------------------------
# 🧪 TESTES (Linux + Windows com paralelismo)
# ---------------------------------------------------------
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[ci]

      - name: Run tests (parallel)
        env:
          DISCORD_TOKEN: test-token
          ENVIRONMENT: test
          LLM_PROVIDER: mock
          EMBEDDING_PROVIDER: mock
        run: |
          pytest -n auto \
            --dist=worksteal \
            --cov=src/rpg_narrative_server \
            --cov-report=xml \
            --cov-report=term

# ---------------------------------------------------------
# 📊 COVERAGE (Linux apenas)
# ---------------------------------------------------------
  coverage:
    name: Coverage Upload
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

# ---------------------------------------------------------
# 🐳 DOCKER (validação simples)
# ---------------------------------------------------------
  docker-check:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rpg-narrative-server:ci .
