name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ---------------------------------------------------------
  # 🔧 PRE-COMMIT (consistência total)
  # ---------------------------------------------------------
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files

  # ---------------------------------------------------------
  # 🧹 LINT + TYPE CHECK
  # ---------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    needs: pre-commit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Cache pip (extra)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}

      - run: pip install -e .[ci]

      - run: ruff check .
      - run: black --check .
      - run: mypy src

  # ---------------------------------------------------------
  # 🧪 TESTES (matrix OS + Python)
  # ---------------------------------------------------------
  test:
    runs-on: ${{ matrix.os }}
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Cache pip (extra)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}

      - run: pip install -e .[ci]

      - name: Run tests
        env:
          DISCORD_TOKEN: test-token
          ENVIRONMENT: test
          LLM_PROVIDER: mock
          EMBEDDING_PROVIDER: mock
        run: |
          pytest -n auto --dist=worksteal \
            --cov=src/rpg_narrative_server \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=50

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            .coverage*
            coverage.xml

  # ---------------------------------------------------------
  # 📊 COVERAGE CONSOLIDADO
  # ---------------------------------------------------------
  coverage:
    name: Coverage (robust)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: coverage

      - name: Install coverage
        run: pip install coverage

      - name: Combine coverage
        run: |
          coverage combine coverage || echo "combine failed"
          coverage report --fail-under=80
          coverage xml -o combined.xml

      - name: Upload to Codecov (opcional)
        uses: codecov/codecov-action@v4
        with:
          files: combined.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ---------------------------------------------------------
  # 🧠 VALIDAR ARQUITETURA
  # ---------------------------------------------------------
  architecture:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install import-linter

      - name: Run architecture validation
        run: lint-imports

  # ---------------------------------------------------------
  # 🔐 SECURITY CHECK
  # ---------------------------------------------------------
  security:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pip-audit
      - run: pip-audit

  # ---------------------------------------------------------
  # 🐳 DOCKER (BUILD + RUN TEST)
  # ---------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t rpg-narrative-server:ci .

      - name: Run container
        run: |
          docker run -d -p 8000:8000 --name app rpg-narrative-server:ci
          sleep 5

      - name: Healthcheck
        run: |
          curl -f http://localhost:8000/health || (docker logs app && exit 1)

      - name: Cleanup
        if: always()
        run: docker rm -f app
