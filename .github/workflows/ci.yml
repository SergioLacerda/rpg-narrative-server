name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ---------------------------------------------------------
  # 🔧 PRE-COMMIT (lint + format + checks)
  # ---------------------------------------------------------
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files

  # ---------------------------------------------------------
  # 🧪 TESTES (matrix OS + Python)
  # ---------------------------------------------------------
  test:
    runs-on: ${{ matrix.os }}
    needs: pre-commit

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e .[ci]

      - name: Run tests
        env:
          DISCORD_TOKEN: test-token
          ENVIRONMENT: test
          LLM_PROVIDER: mock
          EMBEDDING_PROVIDER: mock
        run: pytest -n auto --dist=worksteal --cov=rpg_narrative_server --cov-report=xml
        # Nota: pytest-cov já faz o combine dos workers do xdist internamente,
        # gerando um único .coverage ao final. Não é necessário rodar coverage combine aqui.

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.python-version }}
          path: .coverage
          if-no-files-found: error
          include-hidden-files: true

  # ---------------------------------------------------------
  # 📊 COVERAGE CONSOLIDADO
  # ---------------------------------------------------------
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package
        run: pip install coverage -e .[ci]

      # download-artifact@v4 sem 'name' baixa todos os artifacts,
      # cada um numa subpasta: artifacts/coverage-ubuntu-latest-3.11/.coverage etc.
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Renomeia cada .coverage para nome único antes de combinar,
      # pois coverage combine exige nomes distintos no mesmo diretório.
      - name: Prepare coverage files
        run: |
          echo "Artifacts encontrados:"
          find artifacts -name ".coverage" -type f

          i=0
          while IFS= read -r f; do
            cp "$f" ".coverage.part${i}"
            i=$((i + 1))
          done < <(find artifacts -name ".coverage" -type f)

          echo "Arquivos prontos para combine:"
          ls -la .coverage.part* 2>/dev/null || echo "Nenhum arquivo encontrado!"

      - name: Combine & report coverage
        run: |
          coverage combine
          coverage report --fail-under=50
          coverage xml -o combined.xml

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: combined.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ---------------------------------------------------------
  # 🧠 VALIDAR ARQUITETURA
  # ---------------------------------------------------------
  architecture:
    runs-on: ubuntu-latest
    needs: pre-commit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install import-linter

      - name: Run architecture validation
        run: lint-imports --config importlinter.ini
        env:
          PYTHONPATH: src

  # ---------------------------------------------------------
  # 🔐 SECURITY CHECK
  # ---------------------------------------------------------
  security:
    runs-on: ubuntu-latest
    needs: pre-commit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .[ci]

      - run: pip install pip-audit

      - name: Run security audit
        run: pip-audit --ignore-vuln CVE-2026-4539 --ignore-vuln CVE-2026-32274

  # ---------------------------------------------------------
  # 🐳 DOCKER (BUILD + HEALTHCHECK)
  # ---------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t rpg-narrative-server:ci .

      - name: Run container
        run: |
          docker run -d -p 8000:8000 \
            -e ENVIRONMENT=test \
            -e ENABLE_DISCORD=false \
            -e DISCORD_PUBLIC_KEY=test-public-key \
            -e DISCORD_APPLICATION_ID=123456789 \
            -e DISCORD_TOKEN=test-token \
            -e LLM_PROVIDER=mock \
            -e LLM_MODEL=mock-model \
            -e EMBEDDING_PROFILE=mock \
            -e EMBEDDING_PROVIDER=mock \
            -e DEVICE=cpu \
            -e STORAGE=memory \
            -e CHROMA_PERSIST_DIR=/tmp/chroma \
            --name app rpg-narrative-server:ci
          sleep 5

      - name: Healthcheck
        run: |
          curl -f http://localhost:8000/health || (docker logs app && exit 1)

      - name: Cleanup
        if: always()
        run: docker rm -f app
