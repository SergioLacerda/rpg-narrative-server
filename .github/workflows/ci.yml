name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      # 📥 Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 🐍 Setup Python + cache automático
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # 📦 Instala dependências (profile leve)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[ci]

      # 🔍 Lint
      - name: Lint (ruff)
        run: ruff check .

      # 🎨 Format check
      - name: Format check (black)
        run: black --check .

      # 🧠 Type check (não bloqueante)
      - name: Type check (mypy)
        run: mypy src || true

      # 🧪 Testes + coverage
      - name: Run tests with coverage
        env:
          DISCORD_TOKEN: test-token
          ENVIRONMENT: test
          LLM_PROVIDER: mock
          EMBEDDING_PROVIDER: mock
        run: pytest --cov=src/rpg_narrative_server --cov-report=xml --cov-report=term

      # 📊 Upload coverage (apenas Linux)
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      # 📥 Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 🐳 Setup buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🐳 Build com cache (sem push ainda)
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: rpg-narrative-server:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max