name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies (lightweight)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[ci]

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Type check (mypy)
        run: mypy src || true

      - name: Debug container file
        run: |
          echo "---- container.py ----"
          sed -n '1,80p' src/rpg_narrative_server/bootstrap/container.py

      - name: Debug chroma backend
        run: |
          echo "---- chroma_backend.py ----"
          sed -n '1,40p' src/rpg_narrative_server/infrastructure/storage/backends/chroma_backend.py
          
      - name: Run tests with coverage
        run: pytest --cov=src/rpg_narrative_server --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          verbose: true
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (with cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: rpg-narrative-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
