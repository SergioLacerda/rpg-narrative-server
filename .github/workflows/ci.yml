name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # -----------------------------------------------------------
  # LINT — ruff + black + mypy
  # FIX: removido "|| true" do mypy. Erros de tipo agora falham
  # o CI. Overrides no pyproject.toml controlam o que é ignorado
  # (infraestrutura), então o gate é honesto.
  # -----------------------------------------------------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -e .[ci]

      - run: ruff check .
      - run: black --check .
      - run: mypy src   # sem || true — deixa falhar de verdade


  # -----------------------------------------------------------
  # TEST — matriz ubuntu + windows, com paralelismo via -n auto
  # FIX: parallelismo ativado no CI por env (não no addopts global)
  # para evitar falhas não-determinísticas em ambientes locais.
  # -----------------------------------------------------------
  test:
    runs-on: ${{ matrix.os }}
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -e .[ci]

      - name: Run tests
        env:
          DISCORD_TOKEN: test-token
          ENVIRONMENT: test
          LLM_PROVIDER: mock
          EMBEDDING_PROVIDER: mock
        run: |
          pytest -n auto --dist=worksteal \
            --cov=src/rpg_narrative_server \
            --cov-report=term-missing \
            --cov-append

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: .coverage*
          # FIX: if-no-files-found garante que o CI falha
          # quando nenhum dado de coverage foi gerado
          if-no-files-found: error


  # -----------------------------------------------------------
  # COVERAGE — combina linux + windows e envia ao Codecov
  #
  # FIX (crítico): indentação do job estava incorreta no YAML
  # original — name/runs-on/steps estavam fora do job, causando
  # erro de parse silencioso.
  #
  # FIX: adicionado checkout + setup-python (necessários para
  # que coverage xml mapeie corretamente as linhas do fonte).
  #
  # FIX: lógica do combine reescrita — após download, os arquivos
  # ficam em subdiretórios e precisam ser achados com find antes
  # de combinar.
  # -----------------------------------------------------------
  coverage:
    name: Coverage (combined)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -e .[ci] coverage[toml]

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: coverage-artifacts

      - name: Flatten coverage files
        # FIX: após o download, cada artefato fica em seu próprio
        # subdiretório (coverage-artifacts/coverage-ubuntu-latest/.coverage).
        # O "find" os move para o diretório raiz antes do combine.
        run: |
          find coverage-artifacts -name '.coverage*' -exec mv {} . \;
          echo "Coverage files found:"
          ls -la .coverage* || echo "none found"

      - name: Combine coverage
        run: coverage combine

      - name: Generate XML reports
        run: |
          coverage xml -o combined.xml
          coverage xml \
            --include="src/rpg_narrative_server/domain/*,src/rpg_narrative_server/application/*" \
            -o domain.xml
          coverage xml \
            --include="src/rpg_narrative_server/infrastructure/*,src/rpg_narrative_server/frameworks/*" \
            -o infra.xml

      - name: Coverage summary (terminal)
        run: coverage report --skip-empty

      - name: Upload overall coverage
        uses: codecov/codecov-action@v4
        with:
          files: combined.xml
          flags: overall
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload domain coverage
        uses: codecov/codecov-action@v4
        with:
          files: domain.xml
          flags: domain
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload infra coverage
        uses: codecov/codecov-action@v4
        with:
          files: infra.xml
          flags: infra
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}


  # -----------------------------------------------------------
  # DOCKER — valida que a imagem builda sem erro
  # -----------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
      - run: docker build -t rpg-narrative-server:ci .
