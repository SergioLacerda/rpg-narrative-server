[project]
name = "rpg_narrative_server"
version = "0.1.0"
description = "Narrative engine for RPG storytelling (LLM + RAG)"
requires-python = ">=3.11,<3.13"
readme = "README.md"

authors = [
    { name = "Sergio Lacerda Vieira" }
]

# ---------------------------------------------------------
# Core dependencies (runtime mínimo)
# ---------------------------------------------------------
dependencies = [
    "fastapi>=0.115,<1.0",
    "uvicorn[standard]>=0.34,<1.0",
    "blinker>=1.9,<2.0",
    "discord.py>=2.4,<3.0",
    "python-dotenv>=1.0,<2.0",
    "openai>=1.51,<2.0",
    "tenacity>=9.0,<10.0",

    # compatibilidade com chroma + torch
    "numpy>=1.26,<2.0",

    # ANN
    "hnswlib>=0.8,<1.0",
]

# ---------------------------------------------------------
# Optional dependencies (profiles)
# ---------------------------------------------------------
[project.optional-dependencies]

# 🔹 Vector DB
vector-db = [
    "chromadb>=0.4.24,<0.6"
]

# 🔹 Embeddings locais
local = [
    "torch>=2.2,<3.0",
    "sentence-transformers>=2.7,<3.0",
]

# 🔹 Full stack
full = [
    "torch>=2.2,<3.0",
    "sentence-transformers>=2.7,<3.0",
    "chromadb>=0.4.24,<0.6"
]

# 🔹 Testes
test = [
    "pytest>=8.3,<9.0",
    "pytest-asyncio>=0.23,<0.25",
    "pytest-cov>=5.0,<6.0",
    "pytest-env>=1.1,<2.0",
    "pytest-mock>=3.14,<4.0",
]

# 🔹 Desenvolvimento (local)
dev = [
    "black>=24.0,<25.0",
    "ruff>=0.6,<1.0",
    "mypy>=1.10,<2.0",
]

# 🔹 CI (leve + completo)
ci = [
    "rpg_narrative_server[test]",
    "black>=24.0,<25.0",
    "ruff>=0.6,<1.0",
    "mypy>=1.10,<2.0",
]

# ---------------
